<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UserStamp</title>
    <style>
      :root {
        --green: #188038;
        --red: #c8102e;
        --border: #dadce0;
        --muted: #5f6368;
        --bg: #ffffff;
        --fg: #202124;
      }
      * {
        box-sizing: border-box;
      }
      body {
        width: 320px;
        margin: 0;
        padding: 14px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        font-size: 13px;
        color: var(--fg);
        background: var(--bg);
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      header h1 {
        font-size: 15px;
        margin: 0;
        font-weight: 600;
      }
      .dot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 30px;
        padding: 2px 7px;
        border-radius: 8px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #ffffff;
        background: var(--red);
      }
      .dot.on {
        background: var(--green);
      }
      .section {
        margin-bottom: 14px;
      }
      label.field-label {
        display: block;
        font-weight: 600;
        margin-bottom: 5px;
      }
      .radios {
        display: flex;
        gap: 6px;
      }
      .radios label {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        padding: 7px 4px;
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
        user-select: none;
      }
      .radios input {
        margin: 0;
      }
      input[type="text"],
      select {
        width: 100%;
        padding: 7px 8px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
      }
      .row {
        display: flex;
        gap: 6px;
      }
      .row input[type="text"] {
        flex: 1;
      }
      button {
        font-family: inherit;
        font-size: 13px;
        padding: 7px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #f8f9fa;
        cursor: pointer;
      }
      button.primary {
        background: var(--green);
        color: #fff;
        border-color: var(--green);
      }
      button:hover {
        filter: brightness(0.97);
      }
      .preview {
        margin-top: 8px;
        padding: 8px 10px;
        background: #f1f3f4;
        border-radius: 6px;
        font-family: "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
        font-size: 12px;
        word-break: break-word;
        min-height: 16px;
      }
      .preview .muted {
        color: var(--muted);
      }
      .seat-list {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .seat-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      .seat-item .name {
        flex: 1;
        word-break: break-word;
      }
      .seat-item button {
        padding: 3px 8px;
        font-size: 12px;
      }
      .hidden {
        display: none;
      }
      footer {
        margin-top: 8px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 11px;
        line-height: 1.4;
      }
      .hint {
        color: var(--muted);
        font-size: 11px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <span id="statusDot" class="dot"></span>
      <h1>UserStamp</h1>
    </header>

    <div class="section">
      <span class="field-label">Mode</span>
      <div class="radios">
        <label><input type="radio" name="mode" value="off" /> Off</label>
        <label><input type="radio" name="mode" value="solo" /> Solo</label>
        <label><input type="radio" name="mode" value="team" /> Team</label>
      </div>
    </div>

    <!-- Solo -->
    <div id="soloSection" class="section hidden">
      <label class="field-label" for="soloLabel">Your signature</label>
      <input type="text" id="soloLabel" placeholder="e.g. David" autocomplete="off" />
      <div class="preview" id="soloPreview"></div>
    </div>

    <!-- Team -->
    <div id="teamSection" class="section hidden">
      <label class="field-label" for="activeSeat">Active seat</label>
      <select id="activeSeat"></select>
      <div class="preview" id="teamPreview"></div>

      <div class="seat-list" id="seatList"></div>

      <div class="row" style="margin-top: 10px">
        <input type="text" id="newSeat" placeholder="Add a seat label" autocomplete="off" />
        <button id="addSeat" class="primary">Add</button>
      </div>
      <div class="hint">Add the people who share this seat, then pick who is active.</div>
    </div>

    <!-- Frequency -->
    <div class="section">
      <span class="field-label">Frequency</span>
      <div class="radios">
        <label><input type="radio" name="frequency" value="every" /> Every message</label>
        <label><input type="radio" name="frequency" value="first" /> First per conversation</label>
      </div>
    </div>

    <footer>
      The seat label is stored locally on this device and is never transmitted.
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
